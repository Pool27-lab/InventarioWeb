<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Ventas</title>


<link 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">


<link rel="stylesheet" href="css/style.css">

</head>


<body>


<div class="container mt-4">


<h2>🛒 Nueva Venta</h2>



<div class="row">


<div class="col-md-6">


<label>Cliente</label>


<select 
id="cliente"
class="form-control">

</select>


</div>



<div class="col-md-6">


<label>Producto</label>


<select 
id="producto"
class="form-control">

</select>


</div>


</div>




<div class="row mt-3">


<div class="col-md-4">


<label>Cantidad</label>


<input 
id="cantidad"
type="number"
class="form-control"
value="1">


</div>



<div class="col-md-4 mt-4">


<button
class="btn btn-primary"
onclick="agregarCarrito()">


Agregar


</button>


</div>


</div>





<hr>



<h4>Detalle Venta</h4>


<table class="table table-bordered">


<thead class="table-dark">

<tr>

<th>Producto</th>
<th>Cantidad</th>
<th>Precio</th>
<th>Subtotal</th>
<th></th>

</tr>

</thead>



<tbody id="carrito">


</tbody>


</table>




<h3>
Total:
S/. <span id="total">0</span>
</h3>

<a href="dashboard.html" class="btn btn-primary mb-3">
    ⬅ Regresar al Dashboard
</a>

<button
class="btn btn-success"
onclick="registrarVenta()">


Registrar Venta


</button>




</div>




<script src="js/ventas.js"></script>


</body>

</html>
