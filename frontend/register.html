<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="login-body">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow login-card">
                <div class="card-body">
                    <h3 class="text-center mb-4">Registrar usuario</h3>

                    <div class="mb-3">
                        <label>Nombre</label>
                        <input type="text" id="nombre" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Usuario</label>
                        <input type="text" id="usuario" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Password</label>
                        <input type="password" id="password" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Confirmar password</label>
                        <input type="password" id="confirmarPassword" class="form-control">
                    </div>

                    <button class="btn btn-primary w-100" onclick="registerUser()">Registrar</button>
                    <button class="btn btn-link w-100 mt-2" onclick="window.location.href='index.html'">Volver al login</button>

                    <p id="mensaje" class="text-center mt-3"></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/register.js"></script>
</body>

</html>
